<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kejutan Terakhir - Kaka Diah 💖</title>
    <link rel="shortcut icon" href="./icon.png" type="image/x-icon">
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Layered Pink Background -->
    <div class="stacked-bg"></div>

    <!-- Random Background Photos -->
    <div id="random-photos-bg"></div>

    <!-- Canvas for heart effects -->
    <canvas id="canvas"></canvas>

    <!-- Carousel -->
    <div id="drag-container">
        <div id="spin-container">
            <img src="images/r1.jpg" alt="">
            <img src="images/r2.jpg" alt="">
            <img src="images/r3.jpg" alt="">
            <img src="images/r4.jpg" alt="">
            <img src="images/r5.jpg" alt="">
            <img src="images/r6.jpg" alt="">
            <img src="images/r7.jpg" alt="">
            <img src="images/r8.jpg" alt="">
            <img src="images/r9.jpg" alt="">
            <img src="images/r10.jpg" alt="">
            <img src="images/r11.jpg" alt="">
            <img src="images/r12.jpg" alt="">
            <img src="images/r13.jpg" alt="">
            <img src="images/r14.jpg" alt="">
            <img src="images/r15.jpg" alt="">
            <img src="images/r16.jpg" alt="">
            <img src="images/r17.jpg" alt="">
            <p>Happy Birthday Kaka Diah! 💖</p>
        </div>
        <div id="ground"></div>
    </div>

    <div id="music-container"></div>

    <!-- Musik baru, mulai dari awal -->
    <audio id="bgAudio" playsinline loop>
        <source src="music/setlove.mp3" type="audio/mpeg">
    </audio>

    <script src="main.js"></script>
    <script>
        // ============ 1. Background Random Photos ============
        const bgWall = document.getElementById('random-photos-bg');
        const totalImgs = 17;
        for (let i = 1; i <= totalImgs; i++) {
            const img = document.createElement('img');
            img.src = `images/r${i}.jpg`;
            img.className = 'bg-random-photo';
            img.style.cssText = `
                left: ${Math.random() * 100}vw;
                top: ${Math.random() * 100}vh;
                transform: rotate(${Math.random() * 50 - 25}deg) scale(${Math.random() * 0.4 + 0.5});
                opacity: 0.12;
            `;
            bgWall.appendChild(img);
        }

        // ============ 2. Musik Baru (mulai dari 0) ============
        const audio = document.getElementById('bgAudio');
        audio.currentTime = 0; // Mulai dari awal

        const startAudio = () => {
            audio.play().then(() => {
                ['click','touchstart','mousedown','keydown']
                    .forEach(ev => document.removeEventListener(ev, startAudio));
            }).catch(() => {});
        };

        startAudio();
        ['click','touchstart','mousedown','keydown']
            .forEach(ev => document.addEventListener(ev, startAudio, { once: true }));

        // ============ 3. Canvas Heart & Firework Effects ============
        window.onload = function() {
            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });

            function rand(min, max) { return Math.random() * (max - min) + min; }

            function Heart(x, y) {
                this.x = x;
                this.y = y;
                this.size = rand(15, 35);
                this.vx = rand(-1, 1);
                this.vy = rand(-2.5, -1);
                this.opacity = rand(0.5, 1);
                this.color = `hsl(${rand(330, 360)}, 90%, 60%)`;
            }
            Heart.prototype.draw = function() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.font = `${this.size}px serif`;
                ctx.fillText('💖', this.x, this.y);
                ctx.restore();
            };
            Heart.prototype.update = function() {
                this.x += this.vx;
                this.y += this.vy;
                this.opacity -= 0.008;
            };

            let hearts = [];
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (Math.random() < 0.05) {
                    hearts.push(new Heart(rand(0, canvas.width), canvas.height));
                }
                hearts = hearts.filter(h => h.opacity > 0);
                hearts.forEach(h => { h.draw(); h.update(); });
                requestAnimationFrame(animate);
            }
            animate();
        };
    </script>
</body>
</html>
