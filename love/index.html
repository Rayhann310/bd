<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kejutan Terakhir - Kaka Diah 💖</title>
    <link rel="shortcut icon" href="./icon.png" type="image/x-icon">
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

    <div class="stacked-bg"></div>
    <canvas id="bg-canvas"></canvas>
    <div id="hearts-layer"></div>

    <div id="drag-container">
        <div id="spin-container">
            <img src="images/r1.jpg" alt="">
            <img src="images/r2.jpg" alt="">
            <img src="images/r3.jpg" alt="">
            <img src="images/r4.jpg" alt="">
            <img src="images/r9.jpg" alt="">
            <img src="images/r12.jpg" alt="">
            <img src="images/r14.jpg" alt="">
            <img src="images/r15.jpg" alt="">
            <img src="images/r16.jpg" alt="">
            <img src="images/r17.jpg" alt="">
        </div>

        <div id="neon-text">
            <p>Happy Birthday<br><span>Kaka Diah! 💖</span></p>
        </div>
        <div id="ground"></div>
    </div>

    <audio id="bgAudio" playsinline loop>
        <source src="music/setlove.mp3" type="audio/mpeg">
    </audio>

    <script src="main.js"></script>
    <script>
        // ===== 1. Kolase Rapi (Grid Mode) =====
        function initBgGrid() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            const imgs = Array.from(document.querySelectorAll('#spin-container img'));
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            function drawGrid() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const cols = 8;
                const imgSize = canvas.width / cols;
                const rows = Math.ceil(canvas.height / imgSize) + 1;

                ctx.globalAlpha = 0.15; // Transparansi kolase
                
                let imgIdx = 0;
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const img = imgs[imgIdx % imgs.length];
                        if (img.complete) {
                            // Gambar berjejer lurus tanpa rotasi acak
                            ctx.drawImage(img, c * imgSize, r * imgSize, imgSize - 2, imgSize - 2);
                        }
                        imgIdx++;
                    }
                }
            }

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                drawGrid();
            });

            if (imgs.every(img => img.complete)) drawGrid();
            else imgs.forEach(img => img.addEventListener('load', drawGrid));
        }

        // ===== 2. Floating Hearts =====
        const heartsLayer = document.getElementById('hearts-layer');
        function spawnHeart() {
            const h = document.createElement('span');
            h.textContent = ['💖','🌸','💕','✨'][Math.floor(Math.random()*4)];
            h.className = 'float-heart';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random() * 15 + 10) + 'px';
            h.style.animationDuration = (Math.random() * 5 + 5) + 's';
            heartsLayer.appendChild(h);
            setTimeout(() => h.remove(), 10000);
        }
        setInterval(spawnHeart, 800);

        // ===== 3. Music (Mulai dari Awal) =====
        window.addEventListener('load', () => {
            initBgGrid();
            const audio = document.getElementById('bgAudio');
            audio.volume = 1.0;
            audio.currentTime = 0; // Paksa dari awal

            const startAudio = () => {
                audio.play().catch(() => {});
                ['click','touchstart'].forEach(ev => document.removeEventListener(ev, startAudio));
            };
            ['click','touchstart'].forEach(ev => document.addEventListener(ev, startAudio));
        });
    </script>
</body>
</html>
