<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kejutan Terakhir - Kaka Diah 💖</title>
    <link rel="shortcut icon" href="./icon.png" type="image/x-icon">
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Layered Pink Background -->
    <div class="stacked-bg"></div>

    <!-- Random Background Photos -->
    <div id="random-photos-bg"></div>

    <!-- CSS Floating Hearts (no canvas needed) -->
    <div id="hearts-layer"></div>

    <!-- Carousel -->
    <div id="drag-container">
        <div id="spin-container">
            <img src="images/r1.jpg" alt="">
            <img src="images/r2.jpg" alt="">
            <img src="images/r3.jpg" alt="">
            <img src="images/r4.jpg" alt="">
            <img src="images/r9.jpg" alt="">
            <img src="images/r12.jpg" alt="">
            <img src="images/r14.jpg" alt="">
            <img src="images/r15.jpg" alt="">
            <img src="images/r16.jpg" alt="">
            <img src="images/r17.jpg" alt="">
            <p>Happy Birthday Kaka Diah! 💖</p>
        </div>
        <div id="ground"></div>
    </div>

    <div id="music-container"></div>

    <audio id="bgAudio" playsinline loop>
        <source src="music/setlove.mp3" type="audio/mpeg">
    </audio>

    <script src="main.js"></script>
    <script>
        // ===== 1. Random Background Photos =====
        const existingImgs = ['r1','r2','r3','r4','r9','r12','r14','r15','r16','r17'];
        const bgWall = document.getElementById('random-photos-bg');
        existingImgs.forEach(name => {
            const img = document.createElement('img');
            img.src = `images/${name}.jpg`;
            img.className = 'bg-random-photo';
            img.style.left   = Math.random() * 95 + 'vw';
            img.style.top    = Math.random() * 95 + 'vh';
            img.style.transform = `rotate(${Math.random() * 50 - 25}deg) scale(${Math.random() * 0.35 + 0.45})`;
            img.style.opacity = '0.13';
            bgWall.appendChild(img);
        });

        // ===== 2. CSS Floating Hearts =====
        const heartsLayer = document.getElementById('hearts-layer');
        function spawnHeart() {
            const h = document.createElement('span');
            h.textContent = ['💖','🌸','💕','✨'][Math.floor(Math.random()*4)];
            h.className = 'float-heart';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random() * 16 + 12) + 'px';
            h.style.animationDuration = (Math.random() * 4 + 4) + 's';
            heartsLayer.appendChild(h);
            setTimeout(() => h.remove(), 8000);
        }
        setInterval(spawnHeart, 600);

        // ===== 3. Music (fresh start) =====
        window.addEventListener('load', () => {
            const audio = document.getElementById('bgAudio');
            audio.volume = 1.0;
            audio.currentTime = 0;

            const startAudio = () => {
                audio.play().then(() => {
                    console.log("Music started!");
                    ['click','touchstart','mousedown','keydown']
                        .forEach(ev => document.removeEventListener(ev, startAudio));
                }).catch(e => console.log("Playback blocked, waiting for interaction..."));
            };

            // Pemicu otomatis (jika diizinkan browser)
            startAudio();
            
            // Pemicu interaksi (wajib untuk HP)
            ['click','touchstart','mousedown','keydown']
                .forEach(ev => document.addEventListener(ev, startAudio, { once: true }));
        });
    </script>
</body>
</html>
