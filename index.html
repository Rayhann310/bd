<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Kaka Diah!</title>
    <meta name="description" content="Kado Spesial untuk Kaka Diah">
    <link rel="icon" type="image/x-icon" href="https://feeldreams.github.io/favicon.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Pacifico&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="./assets/css/style.css">
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.0.19/dist/sweetalert2.all.min.js"></script>
    <script src="https://unpkg.com/typeit@8.7.0/dist/index.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>
    <!-- Loading Bar (Mobile Friendly) -->
    <div id="loading-container" class="sembunyi">
        <div class="loading-bar-wrapper">
            <div id="loading-bar"></div>
        </div>
        <p id="loading-text">Menyiapkan kejutan untukmu... ✨</p>
    </div>

    <!-- Festive Background Elements -->
    <div class="floating-elements" id="balloons"></div>
    
    <audio src="./love/music/setlove.mp3" id="linkmp3" class="sembunyi" loop></audio>

    <div id="bodyblur">
        <img src="" id="wallpaper" />
    </div>

    <div id="Content">
        <div id="kadoIn">
            <img src="./Valentine-Surprise.png" alt="Open Gift Button" />
        </div>
        
        <p id="ket">
            <span>Ada kado spesial untuk Kaka Diah! ✨</span>
        </p>

        <div class="kumpulanstiker">
            <img src="https://media.tenor.com/4Ijycn6xFzUAAAAj/mochi-blue-roses.gif" id="fotostiker" alt="sticker" />
        </div>

        <blockquote id="bq">
            <p id="kalimat">Halo Kaka Diah, Selamat Ulang Tahun! 🎉</p>
            <p id="pesan1">Tap kado untuk kejutan spesial! 🎁</p>
        </blockquote>

        <div id="Tombol"><a id="By">Lanjut ✨</a></div>
    </div>

    <script src="./assets/js/main.js"></script>
    <script>
        // Loading Messages (Lebih Mengena di Hati)
        const loadingMsgs = [
            "Mengingat momen indah kita... ✨",
            "Menyiapkan senyum terbaik untukmu... 😊",
            "Mengumpulkan doa-doa tulus... 🙏",
            "Merapikan kejutan spesial... 🎀",
            "Menata cinta dalam setiap foto... 📸",
            "Membangun kenangan manis... 🏰",
            "Hampir sampai! Sabar ya Kaka Diah... 🐼💖",
            "Mempersiapkan hati yang paling tulus... ❤️"
        ];

        // Initialize balloons
        const balloonContainer = document.getElementById('balloons');
        const colors = ['#ff9a9e', '#fad0c4', '#ff217d', '#3333ff', '#ff00cc'];
        
        for (let i = 0; i < 15; i++) {
            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            balloon.style.setProperty('--left', Math.random() * 100 + 'vw');
            balloon.style.animationDelay = Math.random() * 10 + 's';
            balloon.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            balloonContainer.appendChild(balloon);
        }

        let audio = document.getElementById('linkmp3');
        let fungsiAwal = 0;
        
        // Music Persistence Logic
        if (localStorage.getItem('musicTime')) {
            audio.currentTime = parseFloat(localStorage.getItem('musicTime'));
        }

        setInterval(() => {
            if (!audio.paused) {
                localStorage.setItem('musicTime', audio.currentTime);
            }
        }, 500);
        
        setTimeout(() => {
            document.getElementById('Content').style.opacity = '1';
        }, 500);

        document.getElementById("kadoIn").onclick = function () {
            if (fungsiAwal == 0) {
                fungsiAwal = 1;
                confetti({
                    particleCount: 200,
                    spread: 90,
                    origin: { y: 0.6 }
                });
                
                this.style.transition = "all .8s ease";
                this.style.transform = "scale(0)";
                this.style.opacity = "0";
                
                setTimeout(() => {
                    this.classList.add('sembunyi');
                    document.getElementById('ket').classList.add('sembunyi');
                    
                    const loadingContainer = document.getElementById("loading-container");
                    const loadingBar = document.getElementById("loading-bar");
                    const loadingText = document.getElementById("loading-text");
                    loadingContainer.classList.remove('sembunyi');
                    
                    let progress = 0;
                    let msgIndex = 0;

                    // Cycle loading text (setiap 1.5 detik)
                    const msgInterval = setInterval(() => {
                        loadingText.style.opacity = '0';
                        setTimeout(() => {
                            loadingText.innerHTML = loadingMsgs[msgIndex];
                            loadingText.style.opacity = '1';
                            msgIndex = (msgIndex + 1) % loadingMsgs.length;
                        }, 500);
                    }, 1500);
                    
                    const interval = setInterval(() => {
                        progress += 1.5; // Dibuat lebih lambat (total ~10 detik)
                        if (progress >= 100) {
                            progress = 100;
                            clearInterval(interval);
                            clearInterval(msgInterval);
                            setTimeout(() => {
                                window.location = "wish.html";
                            }, 500);
                        }
                        loadingBar.style.width = progress + "%";
                    }, 150);
                }, 800);
            }
        };
    </script>
</body>
</html>
